services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: crypto-kafka
    hostname: kafka
    ports:
      - "9092:9092"   # External (host → Kafka)
      - "9101:9101"
    environment:
      # Single-node KRaft
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Two broker listeners:
      #   PLAINTEXT  :9092  — reachable from the host as localhost:9092
      #   INTERNAL   :29092 — reachable from other containers as kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Single-node KRaft quorum — controller lives in this container
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # Single-replica defaults for local dev
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - crypto-net

    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: crypto-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: crypto-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/crypto-trades &&
      mc mb --ignore-existing local/iceberg &&
      echo 'MinIO buckets crypto-trades and iceberg are ready'
      "
    restart: "no"
    networks:
      - crypto-net

  mysql-metastore:
    image: mysql:8.0.39
    container_name: crypto-mysql-metastore
    hostname: mysql-metastore
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    volumes:
      - mysql_metastore_data:/var/lib/mysql
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive-metastore
    container_name: crypto-hive-metastore
    hostname: hive-metastore
    depends_on:
      mysql-metastore:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      HIVE_METASTORE_PORT: 9083
      HIVE_DB_HOSTNAME: mysql-metastore
      HIVE_DB_NAME: metastore
      HIVE_DB_USER: hive
      HIVE_DB_PASSWORD: hive
      HIVE_METASTORE_URI: thrift://0.0.0.0:9083
      HIVE_METASTORE_WAREHOUSE_DIR: s3a://iceberg
    ports:
      - "9083:9083"
    volumes:
      - hive_metastore_config:/opt/hive/conf
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9083"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crypto-producer
    env_file: ../.env
    environment:
      # Override host-facing defaults with Docker-internal addresses
      KAFKA_BOOTSTRAP: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
    command: ["crypto-producer"]
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - crypto-net

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crypto-consumer
    env_file: ../.env
    environment:
      # Override host-facing defaults with Docker-internal addresses
      KAFKA_BOOTSTRAP: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      PARQUET_ROOT: s3://crypto-trades
    command: ["crypto-consumer"]
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - crypto-net

volumes:
  kafka_data:
  minio_data:
  mysql_metastore_data:
  hive_metastore_config:

networks:
  crypto-net:
    name: crypto-net
